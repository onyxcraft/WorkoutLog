name: CI - Build Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      
      - name: Select Xcode
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
      
      - name: Build
        run: |
          xcodebuild -project WorkoutLog.xcodeproj             -scheme WorkoutLog             -destination 'generic/platform=iOS'             -skipPackagePluginValidation             CODE_SIGNING_ALLOWED=NO             build
